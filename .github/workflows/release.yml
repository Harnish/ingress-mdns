name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0), without leading v"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" \
            -o dist/ingress-mdns main.go

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.43.0/nfpm_2.43.0_amd64.deb \
            -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build deb and rpm
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          nfpm package --config nfpm.yaml --packager deb --target dist/
          nfpm package --config nfpm.yaml --packager rpm --target dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm

      - name: Attach to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm

  build-windows:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/ingress-mdns.exe main.go
          cd dist && zip "ingress-mdns_${VERSION}_windows_amd64.zip" ingress-mdns.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ingress-mdns-windows-amd64
          path: dist/*.zip

      - name: Attach to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
